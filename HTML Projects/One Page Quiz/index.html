<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>One Page Quiz</title>
  </head>
  <body>
    <h1>Let's play together</h1>
    <div class="container">
      <ol>
        <li>
          <h1>Who was the independent King of Bengal?</h1>
          <select name="Quiz" id="Quiz">
            <option value="" disabled selected>Select Answer</option>
            <option value="Shashanka">Shashanka</option>
            <option value="Shah Jahan">Shah Jahan</option>
            <option value="Nobab Sirajuddaula">Nobab Sirajuddaula</option>
          </select>
        </li>
        <li>
          <h1>Who is the prime minister of Bangladesh?</h1>
          <select name="Quiz" id="Quiz">
            <option value="" disabled selected>Select Answer</option>
            <option value="Sheikh Hasina">Sheikh Hasina</option>
            <option value="Mudi">Mudi</option>
            <option value="King John Un">King John Un</option>
          </select>
        </li>
        <li>
          <h1>What isthe color combination of our national flag?</h1>
          <select name="Quiz" id="Quiz">
            <option value="" disabled selected>Select Answer</option>
            <option value="Yello and White">Yello and White</option>
            <option value="green and red">green and red</option>
            <option value="red and white">red and white</option>
          </select>
        </li>
      </ol>
    </div>
    <h2>Your score is: 90</h2>
  </body>
</html>
